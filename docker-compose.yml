services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      LOCAL_MODEL_SERVICE_URL: http://local-model-service:8001
      LOCAL_MODEL_INFER_PATH: /infer
      LOCAL_MODEL_TIMEOUT_MS: 120000
      LOCAL_MODEL_QUANTIZE: "true"
      MAX_UPLOAD_BYTES: 10485760
      MIN_AUDIO_DURATION_MS: 30000
    depends_on:
      local-model-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  local-model-service:
    build:
      context: .
      dockerfile: local_model_service/Dockerfile
      args:
        DAM_REPO_URL: ${DAM_REPO_URL:-https://huggingface.co/KintsugiHealth/dam}
        DAM_REPO_REF: ${DAM_REPO_REF:-main}
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "micromamba",
          "run",
          "-n",
          "dam",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5); sys.exit(0 if r.status==200 else 1)"
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
